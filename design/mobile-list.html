<!DOCTYPE html>
<html class="light" lang="uk"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Приміщення — мобільна версія</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
</style>
<script>
  tailwind.config = { theme: { extend: { colors: {
    primary: '#041627', 'primary-container': '#1a2b3c', 'on-primary': '#ffffff', 'primary-fixed': '#d2e4fb',
    secondary: '#006a6a', 'secondary-container': '#96efee', 'on-secondary-container': '#006e6e',
    surface: '#f8f9ff', 'surface-container-lowest': '#ffffff', 'surface-container-low': '#eff4ff',
    'surface-container': '#e5eeff', 'surface-container-highest': '#d3e4fe',
    'on-surface': '#0b1c30', 'on-surface-variant': '#44474c', 'outline-variant': '#c4c6cd',
    error: '#ba1a1a',
  }, borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' } } } }
</script>
</head>
<body class="bg-surface text-on-surface">
<div class="min-h-screen pb-20 relative">
  <!-- Top app bar -->
  <header class="sticky top-0 z-30 flex items-center justify-between h-14 px-4 bg-surface-container-lowest border-b border-outline-variant shadow-sm">
    <button class="p-2 -ml-2 text-on-surface-variant"><span class="material-symbols-outlined">menu</span></button>
    <h1 class="text-lg font-bold text-primary">Приміщення</h1>
    <button class="p-2 -mr-2 text-on-surface-variant"><span class="material-symbols-outlined">search</span></button>
  </header>

  <!-- Location filter chips -->
  <div class="px-4 py-3 flex gap-2 overflow-x-auto whitespace-nowrap">
    <span class="px-3.5 py-1.5 rounded-full bg-primary text-on-primary text-sm font-semibold">Усі локації</span>
    <span class="px-3.5 py-1.5 rounded-full bg-surface-container text-on-surface-variant text-sm">ТЦ «Схід»</span>
    <span class="px-3.5 py-1.5 rounded-full bg-surface-container text-on-surface-variant text-sm">БЦ «Захід»</span>
    <span class="px-3.5 py-1.5 rounded-full bg-surface-container text-on-surface-variant text-sm">Склад №3</span>
  </div>

  <!-- Premises cards -->
  <main class="px-4 space-y-2.5">
    <div class="bg-surface-container-lowest rounded-xl p-4 border border-surface-container shadow-[0_2px_8px_rgba(26,43,60,0.05)]">
      <div class="flex items-start justify-between">
        <div>
          <p class="font-bold text-primary">A1 <span class="text-on-surface-variant font-normal">· ТЦ «Схід»</span></p>
          <p class="text-sm text-on-surface-variant mt-0.5">Офіс · 24.5 м²</p>
        </div>
        <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase bg-secondary-container text-on-secondary-container">Зайнято</span>
      </div>
      <div class="flex justify-end gap-4 mt-3 pt-3 border-t border-surface-container text-on-surface-variant">
        <button class="flex items-center gap-1 text-sm"><span class="material-symbols-outlined text-[18px]">edit</span>Змінити</button>
        <button class="flex items-center gap-1 text-sm text-error"><span class="material-symbols-outlined text-[18px]">delete</span>Видалити</button>
      </div>
    </div>

    <div class="bg-surface-container-lowest rounded-xl p-4 border border-surface-container shadow-[0_2px_8px_rgba(26,43,60,0.05)]">
      <div class="flex items-start justify-between">
        <div>
          <p class="font-bold text-primary">204 <span class="text-on-surface-variant font-normal">· БЦ «Захід»</span></p>
          <p class="text-sm text-on-surface-variant mt-0.5">Магазин · 60 м²</p>
        </div>
        <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase bg-secondary-container text-on-secondary-container">Зайнято</span>
      </div>
      <div class="flex justify-end gap-4 mt-3 pt-3 border-t border-surface-container text-on-surface-variant">
        <button class="flex items-center gap-1 text-sm"><span class="material-symbols-outlined text-[18px]">edit</span>Змінити</button>
        <button class="flex items-center gap-1 text-sm text-error"><span class="material-symbols-outlined text-[18px]">delete</span>Видалити</button>
      </div>
    </div>

    <div class="bg-surface-container-lowest rounded-xl p-4 border border-surface-container shadow-[0_2px_8px_rgba(26,43,60,0.05)]">
      <div class="flex items-start justify-between">
        <div>
          <p class="font-bold text-primary">C2 <span class="text-on-surface-variant font-normal">· Склад №3</span></p>
          <p class="text-sm text-on-surface-variant mt-0.5">Склад · 180 м²</p>
        </div>
        <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase bg-surface-container-highest text-on-surface-variant">Вільно</span>
      </div>
      <div class="flex justify-end gap-4 mt-3 pt-3 border-t border-surface-container text-on-surface-variant">
        <button class="flex items-center gap-1 text-sm"><span class="material-symbols-outlined text-[18px]">edit</span>Змінити</button>
        <button class="flex items-center gap-1 text-sm text-error"><span class="material-symbols-outlined text-[18px]">delete</span>Видалити</button>
      </div>
    </div>
  </main>

  <!-- Floating action button -->
  <button class="fixed bottom-20 right-4 z-30 w-14 h-14 rounded-full bg-primary text-on-primary shadow-lg flex items-center justify-center">
    <span class="material-symbols-outlined">add</span>
  </button>

  <!-- Bottom navigation -->
  <nav class="fixed bottom-0 inset-x-0 z-20 h-16 bg-surface-container-lowest border-t border-outline-variant flex items-stretch">
    <a class="flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px]">Дашборд</span></a>
    <a class="flex-1 flex flex-col items-center justify-center gap-0.5 text-secondary"><span class="material-symbols-outlined">domain</span><span class="text-[10px] font-semibold">Приміщення</span></a>
    <a class="flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant"><span class="material-symbols-outlined">receipt_long</span><span class="text-[10px]">Нарахування</span></a>
    <a class="flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant"><span class="material-symbols-outlined">payments</span><span class="text-[10px]">Оплати</span></a>
    <a class="flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant"><span class="material-symbols-outlined">menu</span><span class="text-[10px]">Ще</span></a>
  </nav>
</div>
</body></html>
