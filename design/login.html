<!DOCTYPE html>

<html class="light" lang="uk"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Облік Комерційної Оренди - Вхід</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#96efee",
                    "on-primary-container": "#8192a7",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#c1c7cf",
                    "primary": "#041627",
                    "surface-variant": "#d3e4fe",
                    "on-background": "#0b1c30",
                    "outline-variant": "#c4c6cd",
                    "tertiary-container": "#242a30",
                    "tertiary-fixed": "#dde3eb",
                    "on-secondary": "#ffffff",
                    "background": "#f8f9ff",
                    "on-tertiary": "#ffffff",
                    "surface-dim": "#cbdbf5",
                    "secondary": "#006a6a",
                    "primary-fixed-dim": "#b7c8de",
                    "on-secondary-fixed-variant": "#004f50",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#1a2b3c",
                    "tertiary": "#0f161b",
                    "secondary-fixed-dim": "#7dd5d4",
                    "on-secondary-container": "#006e6e",
                    "on-secondary-fixed": "#002020",
                    "surface-container": "#e5eeff",
                    "inverse-primary": "#b7c8de",
                    "on-primary-fixed-variant": "#38485a",
                    "on-tertiary-fixed": "#161c22",
                    "surface-bright": "#f8f9ff",
                    "on-surface": "#0b1c30",
                    "outline": "#74777d",
                    "inverse-on-surface": "#eaf1ff",
                    "on-surface-variant": "#44474c",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#eff4ff",
                    "surface": "#f8f9ff",
                    "on-tertiary-fixed-variant": "#41474e",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#d3e4fe",
                    "on-primary-fixed": "#0b1d2d",
                    "secondary-fixed": "#99f1f1",
                    "on-tertiary-container": "#8b9198",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#213145",
                    "surface-tint": "#4f6073",
                    "surface-container-high": "#dce9ff",
                    "primary-fixed": "#d2e4fb",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "8px",
                    "xl": "12px",
                    "full": "9999px"
            },
            "spacing": {
                    "card-padding": "48px",
                    "unit": "8px",
                    "stack-md": "16px",
                    "container-margin": "32px",
                    "gutter": "24px",
                    "stack-sm": "8px",
                    "stack-lg": "32px"
            },
            "fontFamily": {
                    "display-lg": ["Inter", "sans-serif"],
                    "label-md": ["Inter", "sans-serif"],
                    "headline-md-mobile": ["Inter", "sans-serif"],
                    "body-md": ["Inter", "sans-serif"],
                    "headline-md": ["Inter", "sans-serif"],
                    "headline-sm": ["Inter", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"]
            },
            "fontSize": {
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #f8f9ff;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            box-shadow: 0 4px 12px rgba(26, 43, 60, 0.05);
            max-width: 440px;
            width: 100%;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #eff4ff 0%, #f8f9ff 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-container-margin">
<div class="ambient-glow"></div>
<main class="login-card bg-surface-container-lowest rounded-lg p-card-padding flex flex-col items-center">
<!-- Logo/Header Section -->
<div class="mb-stack-lg text-center">
<div class="mb-stack-md flex justify-center">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-[32px]">domain</span>
</div>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-stack-sm">
                Облік Комерційної Оренди
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Вхід до системи
            </p>
</div>
<!-- Form Section -->
<form class="w-full flex flex-col gap-stack-md" id="loginForm" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider" for="email">
                    Email
                </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">
                        mail
                    </span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface text-body-md focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all placeholder:text-outline" id="email" name="email" placeholder="Введіть ваш email" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider" for="password">
                        Пароль
                    </label>
<a class="font-label-md text-label-md text-secondary hover:underline transition-all" href="#">
                        Забули пароль?
                    </a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">
                        lock
                    </span>
<input class="w-full pl-10 pr-12 py-3 rounded-lg border border-outline-variant bg-surface text-body-md focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all placeholder:text-outline" id="password" name="password" placeholder="Введіть пароль" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="passwordToggleIcon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-stack-md w-full bg-primary-container text-white font-label-md py-4 rounded-lg flex items-center justify-center gap-stack-sm hover:bg-primary transition-all duration-200 shadow-sm active:scale-[0.98]" type="submit">
                Увійти
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Help -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant w-full text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Немає доступу? 
                <a class="text-secondary font-semibold hover:underline" href="#">Зв'яжіться з адміністратором</a>
</p>
</div>
</main>
<!-- Visual Element: Background Subtle Pattern -->
<div class="fixed bottom-0 right-0 w-1/3 h-1/3 opacity-[0.03] pointer-events-none overflow-hidden select-none">
<div class="grid grid-cols-6 gap-8 rotate-12 translate-x-12 translate-y-12">
<span class="material-symbols-outlined text-[120px]">domain</span>
<span class="material-symbols-outlined text-[120px]">apartment</span>
<span class="material-symbols-outlined text-[120px]">real_estate_agent</span>
<span class="material-symbols-outlined text-[120px]">analytics</span>
<span class="material-symbols-outlined text-[120px]">account_balance</span>
<span class="material-symbols-outlined text-[120px]">key</span>
</div>
</div>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('passwordToggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Form submission micro-interaction
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', () => {
            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Вхід...';
            btn.disabled = true;
            
            // Simulating a delay
            setTimeout(() => {
                alert('Функціонал авторизації буде доступний після інтеграції з сервером.');
                btn.innerHTML = 'Увійти <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
                btn.disabled = false;
            }, 1000);
        });
    </script>
</body></html>
